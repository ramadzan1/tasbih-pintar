<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Amiri&display=swap');
  body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
  .light-mode { background-color: #f8fafc; color: #1e293b; }
  .dark-mode { background-color: #0f172a; color: #f8fafc; }
  .arabic-font { font-family: 'Amiri', serif; }
</style>

<body class="light-mode min-h-screen flex flex-col">

  <header class="p-4 bg-white border-b border-gray-200">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-emerald-700">Tasbih Suara</h1>
        <p class="text-xs text-gray-500">JK Masjid K. Pertanian Serdang</p>
      </div>
      <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-emerald-100 text-emerald-700">🌙</button>
    </div>
  </header>

  <main class="max-w-md mx-auto w-full px-4 mt-6 space-y-4">
    <!-- Dropdown -->
    <select id="zikirSelector" onchange="changeZikirSet(this.value)" class="w-full bg-white border border-gray-300 p-4 rounded-2xl font-bold shadow-sm">
       <option value="umum">Zikir Selepas Solat (33x)</option>
       <option value="nabi-yunus">Zikir Nabi Yunus (100x)</option>
    </select>

    <!-- Butang Utama -->
    <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-xl">
      <button id="masterActionBtn" onclick="toggleListening()" class="w-full py-5 rounded-2xl bg-emerald-500 text-white font-bold text-lg shadow-lg shadow-emerald-200">
        Mula Pengecaman Suara
      </button>
    </div>

    <!-- Kad Zikir -->
    <div id="zikirContainer" class="space-y-3"></div>
  </main>

  <script>
    // Fungsi render dengan warna ceria
    function renderZikirCards() {
      const container = document.getElementById('zikirContainer');
      container.innerHTML = zikirData.map(z => `
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex justify-between items-center">
          <div>
            <h3 class="font-bold text-gray-800">${z.name}</h3>
            <p class="text-3xl font-black text-emerald-600">${z.count} <span class="text-sm text-gray-400">/ ${z.target}</span></p>
          </div>
          <span class="arabic-font text-2xl text-emerald-800">${z.arabic}</span>
        </div>
      `).join('');
    }

    function toggleDarkMode() {
      document.body.classList.toggle('light-mode');
      document.body.classList.toggle('dark-mode');
    }
  </script>
